<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livemode · Hub Financeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Tipografia oficial Livemode:
        - Display: Barlow Condensed (substitui Alternate Gothic — mesma família condensed/bold)
        - UI:      Poppins (300/400/500/600/700)
        - Mono:    JetBrains Mono (números financeiros)
    -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      /* ─── DESIGN TOKENS — LIVEMODE ─────────────────────────────────────── */
      :root {
        /* Brand */
        --color-brand: #65B32E;
        --color-brand-strong: #5aa327;
        --color-brand-dim: rgba(101, 179, 46, 0.12);
        --color-brand-border: rgba(101, 179, 46, 0.35);

        /* Surfaces — light */
        --color-bg-page: #F2F3F5;
        --color-bg-surface: #FFFFFF;
        --color-bg-surface-2: #F8F9FA;
        --color-bg-sidebar: #1E1E1E;

        /* Text */
        --color-text-primary: #1A1A1A;
        --color-text-secondary: #6B7280;
        --color-text-muted: #9CA3AF;
        --color-text-inverse: #FFFFFF;

        /* Borders */
        --color-border: rgba(0, 0, 0, 0.08);
        --color-border-medium: rgba(0, 0, 0, 0.15);

        /* Semantic — financeiras */
        --color-orcado: #2563EB;
        --color-provisionado: #D97706;
        --color-realizado: #16A34A;
        --color-projetado: #7C3AED;

        /* Semantic — status */
        --color-active: #65B32E;
        --color-pending: #F59E0B;
        --color-checked: #10B981;
        --color-danger: #DC2626;

        /* Typography */
        --font-display: 'Barlow Condensed', 'Alternate Gothic', sans-serif;
        --font-body: 'Poppins', system-ui, -apple-system, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

        /* Radius */
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 10px;
        --radius-xl: 12px;

        /* Shadows */
        --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);

        /* Motion */
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-in: cubic-bezier(0.4, 0, 1, 1);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --duration-fast: 150ms;
        --duration-base: 220ms;
        --duration-enter: 320ms;
      }

      [data-theme="dark"], .dark, html.dark, body.dark {
        --color-bg-page: #141414;
        --color-bg-surface: #1E1E1E;
        --color-bg-surface-2: #242424;
        --color-bg-sidebar: #111111;
        --color-text-primary: #F0F0F0;
        --color-text-secondary: #9CA3AF;
        --color-text-muted: #6B7280;
        --color-border: rgba(255, 255, 255, 0.07);
        --color-border-medium: rgba(255, 255, 255, 0.12);
        --shadow-card: 0 1px 3px rgba(0,0,0,0.3);
      }

      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        font-family: var(--font-body);
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        scroll-behavior: smooth;
        scroll-padding-top: 64px;
      }

      /* Transição global suave dark/light */
      html, body, #root {
        transition: background-color 300ms var(--ease-out),
                    color 300ms var(--ease-out);
      }

      /* Números financeiros — tabular monoespaçado */
      .num {
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.01em;
      }

      /* Display (títulos / KPI numbers) */
      .display, .kpi-value, .champ-name {
        font-family: var(--font-display);
        font-weight: 700;
        letter-spacing: -0.005em;
      }

      /* Scrollbar refinada */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.25); border-radius: 8px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.45); }

      /* ─── MOTION ─────────────────────────────────────────────────────── */

      @keyframes lm-page-enter {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .page-enter {
        animation: lm-page-enter var(--duration-enter) var(--ease-out) both;
      }

      .stagger > * { animation: lm-page-enter var(--duration-enter) var(--ease-out) both; }
      .stagger > *:nth-child(1) { animation-delay: 0ms; }
      .stagger > *:nth-child(2) { animation-delay: 50ms; }
      .stagger > *:nth-child(3) { animation-delay: 100ms; }
      .stagger > *:nth-child(4) { animation-delay: 150ms; }
      .stagger > *:nth-child(5) { animation-delay: 200ms; }
      .stagger > *:nth-child(6) { animation-delay: 250ms; }

      @keyframes lm-tab-fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .tab-content { animation: lm-tab-fade-in 200ms var(--ease-out) both; }

      /* Pulso "ao vivo" — halo expandindo em volta do dot */
      @keyframes lm-status-halo {
        0%   { box-shadow: 0 0 0 0 rgba(101,179,46,0.55); }
        70%  { box-shadow: 0 0 0 6px rgba(101,179,46,0); }
        100% { box-shadow: 0 0 0 0 rgba(101,179,46,0); }
      }
      .live-dot {
        animation: lm-status-halo 2.4s ease-out infinite;
      }

      /* Skeleton shimmer */
      @keyframes lm-shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .skeleton {
        background: linear-gradient(90deg,
          var(--color-bg-surface-2) 25%,
          rgba(0,0,0,0.06) 50%,
          var(--color-bg-surface-2) 75%);
        background-size: 800px 100%;
        animation: lm-shimmer 1.5s infinite linear;
        border-radius: var(--radius-md);
      }
      .dark .skeleton {
        background: linear-gradient(90deg,
          rgba(255,255,255,0.04) 25%,
          rgba(255,255,255,0.08) 50%,
          rgba(255,255,255,0.04) 75%);
        background-size: 800px 100%;
      }

      /* Botões — feedback tátil global */
      button {
        transition: transform var(--duration-fast) var(--ease-out),
                    filter var(--duration-fast) var(--ease-out),
                    background-color var(--duration-fast) var(--ease-out),
                    border-color var(--duration-fast) var(--ease-out),
                    color var(--duration-fast) var(--ease-out),
                    box-shadow var(--duration-fast) var(--ease-out);
      }
      button:not(:disabled):active {
        transform: scale(0.97);
        filter: brightness(0.96);
      }

      /* Cards interativos — translateY no hover */
      .lm-card-hover {
        transition: transform var(--duration-base) var(--ease-out),
                    box-shadow var(--duration-base) var(--ease-out),
                    border-color var(--duration-base) var(--ease-out);
      }
      .lm-card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      }

      /* prefers-reduced-motion — mata animações */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
